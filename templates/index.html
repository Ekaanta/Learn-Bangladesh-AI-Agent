<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-glow"></div>

<div class="wrapper">
    <!-- Header -->
    <div class="header">
        <div class="flag-icon">Learn About Bangladesh</div>
        <h1>Bangladesh <span class="highlight">AI Agent</span></h1>
        <p class="subtitle">Ask anything about hospitals, institutions, restaurants & more</p>
    </div>

    <!-- Chat Box -->
    <div class="chat-container" id="chat-container">
        <div class="welcome-msg">
            <span>👋</span> Hi! Ask me anything about Bangladesh.
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <textarea id="question" placeholder="Ask anything... (e.g. Best hospitals in Dhaka?)"></textarea>
        <button onclick="askAI()" id="ask-btn">
            <span id="btn-text">Send</span>
            <span id="btn-loader" style="display:none;">⏳</span>
        </button>
    </div>

    <!-- Quick Questions -->
    <div class="quick-btns">
        <span>Try:</span>
        <button onclick="quickAsk('Best hospitals in Dhaka?')">🏥 Hospitals in Dhaka</button>
        <button onclick="quickAsk('Top restaurants in Chittagong?')">🍽️ Restaurants</button>
        <button onclick="quickAsk('Universities in Sylhet?')">🎓 Universities</button>
    </div>
</div>

<script>
function quickAsk(text) {
    document.getElementById("question").value = text;
    askAI();
}

async function askAI() {
    const question = document.getElementById("question").value.trim();
    if (!question) return;

    const chat = document.getElementById("chat-container");
    const btn = document.getElementById("ask-btn");
    const btnText = document.getElementById("btn-text");
    const btnLoader = document.getElementById("btn-loader");

    // Remove welcome message
    const welcome = chat.querySelector(".welcome-msg");
    if (welcome) welcome.remove();

    // Add user message
    chat.innerHTML += `
        <div class="msg user-msg">
            <div class="msg-content">${question}</div>
            <div class="msg-icon">👤</div>
        </div>`;

    // Loading state
    btn.disabled = true;
    btnText.style.display = "none";
    btnLoader.style.display = "inline";

    const loadingId = "loading-" + Date.now();
    chat.innerHTML += `
        <div class="msg ai-msg" id="${loadingId}">
            <div class="msg-icon">🤖</div>
            <div class="msg-content typing">
                <span></span><span></span><span></span>
            </div>
        </div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
        });
        const data = await res.json();

        document.getElementById(loadingId).remove();
        chat.innerHTML += `
            <div class="msg ai-msg">
                <div class="msg-icon">🤖</div>
                <div class="msg-content">${data.answer}</div>
            </div>`;
    } catch (e) {
        document.getElementById(loadingId).remove();
        chat.innerHTML += `
            <div class="msg ai-msg error">
                <div class="msg-icon">⚠️</div>
                <div class="msg-content">Something went wrong. Try again.</div>
            </div>`;
    }

    btn.disabled = false;
    btnText.style.display = "inline";
    btnLoader.style.display = "none";
    document.getElementById("question").value = "";
    chat.scrollTop = chat.scrollHeight;
}

// Enter key support
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("question").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            askAI();
        }
    });
});
</script>

</body>
</html>
